<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUZZ | Architectural Visualization</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500&family=Noto+Sans+SC:wght@100;300&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 调浅后的高级灰色背景 */
            --bg-main: #f7f7f7; 
            --text-main: #111111;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        /* 瀑布流布局优化 */
        .masonry-grid {
            column-count: 1;
            column-gap: 2.5rem;
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 3; } }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 4rem;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            filter: grayscale(0.7);
            opacity: 0.8;
        }

        .masonry-item:hover {
            filter: grayscale(0);
            opacity: 1;
            transform: translateY(-8px);
        }

        /* 镜头缩放动画核心逻辑 */
        .zoom-container {
            position: relative;
            overflow: hidden;
            background: #ededed;
        }

        .zoom-container img {
            transition: transform 8s cubic-bezier(0.25, 0.46, 0.45, 0.94); /* 超长平滑过渡 */
        }

        .masonry-item:hover .zoom-container img {
            transform: scale(1.15); /* 模拟镜头缓慢推进 */
        }

        /* 灯箱样式 */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(247, 247, 247, 0.99);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #lightbox.active {
            display: flex;
            opacity: 1;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 85%;
            box-shadow: 0 40px 100px rgba(0,0,0,0.08);
            transform: scale(0.98);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #lightbox.active img {
            transform: scale(1);
        }

        /* 极小细节文字 */
        .micro-text {
            font-size: 9px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ddd; }

        /* 入场动画 */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: reveal 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    </style>
</head>
<body class="px-8 py-12 md:px-20 md:py-24 lg:px-32">

    <!-- 灯箱容器 -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="">
        <div class="absolute bottom-12 micro-text text-gray-400">ESC or Click to exit</div>
    </div>

    <!-- 极简大字头部 -->
    <header class="mb-32 md:mb-52 flex flex-col md:flex-row justify-between items-end reveal">
        <div>
            <p class="micro-text text-gray-400 mb-6 ml-1">BUZZVISUAL STUDIO / ARCHIVE</p>
            <h1 class="text-7xl md:text-9xl font-thin tracking-[ -0.05em] leading-none">BUZZ</h1>
            <div class="h-1 w-12 bg-black mt-8"></div>
        </div>
        <nav class="mt-16 md:mt-0 flex flex-wrap gap-x-12 gap-y-6 micro-text text-gray-400">
            <a href="#" class="hover:text-black transition-colors">Works</a>
            <a href="#" class="hover:text-black transition-colors">Information</a>
            <a href="mailto:office@buzzvisual.com" class="text-black font-medium">Contact</a>
        </nav>
    </header>

    <!-- 画廊主体 -->
    <main id="gallery" class="masonry-grid reveal" style="animation-delay: 0.4s;">
        <!-- 图片由 JS 动态生成 -->
    </main>

    <!-- 页脚 -->
    <footer class="mt-60 mb-16 pt-16 border-t border-gray-200 flex flex-col md:flex-row justify-between items-start gap-8">
        <div class="max-w-md">
            <h2 class="text-2xl font-light mb-4">Visualizing the future of architecture.</h2>
            <p class="micro-text text-gray-400">Based in London / Serving Globally</p>
        </div>
        <div class="micro-text text-gray-400">
            © 2024 BUZZVISUAL — ALL RIGHTS RESERVED
        </div>
    </footer>

    <script>
        const IMAGE_COUNT = 20; 
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function initGallery() {
            for (let i = 1; i <= IMAGE_COUNT; i++) {
                const fileName = `1 (${i}).jpg`;
                
                const item = document.createElement('div');
                item.className = 'masonry-item group cursor-zoom-in';
                item.onclick = () => openLightbox(fileName);

                item.innerHTML = `
                    <div class="zoom-container">
                        <img 
                            src="${encodeURIComponent(fileName)}" 
                            alt="BuzzVisual Architecture ${i}"
                            class="w-full h-auto"
                            loading="lazy"
                            onerror="handleImageError(this, '${fileName}')"
                        >
                        <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                    </div>
                    <div class="mt-8 flex justify-between items-baseline">
                        <div class="overflow-hidden">
                            <h3 class="micro-text text-gray-900 translate-y-0 transition-transform duration-500">BV.REF.0${i}</h3>
                        </div>
                        <span class="micro-text text-gray-300">2024</span>
                    </div>
                `;

                gallery.appendChild(item);
            }
        }

        // 灯箱交互
        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // 错误占位
        function handleImageError(img, name) {
            img.parentElement.innerHTML = `
                <div class="py-40 flex flex-col items-center justify-center bg-gray-100/50">
                    <span class="micro-text text-gray-300 mb-2">Image Processing</span>
                    <span class="micro-text text-gray-200 text-[8px]">${name}</span>
                </div>
            `;
        }

        window.addEventListener('load', initGallery);

        // ESC 关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
