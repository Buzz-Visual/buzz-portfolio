<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUZZ VISUAL | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #f0f0f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            margin: 0;
        }

        /* 加载动画 */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            transition: opacity 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .loader-num {
            font-size: 5vw;
            font-weight: 300;
            letter-spacing: -0.05em;
        }

        /* 导航栏 - BUZZ 交互 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            mix-blend-mode: difference;
            color: white;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0em;
            transition: letter-spacing 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            cursor: pointer;
        }

        .logo:hover {
            letter-spacing: 0.8em;
            margin-right: -0.8em; /* 补偿拉伸带来的偏移 */
        }

        .nav-links a {
            position: relative;
            margin-left: 2rem;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            width: 0;
            height: 1px;
            background: currentColor;
            transition: all 0.4s ease;
            transform: translateX(-50%);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* 杂志排版栅格系统 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 10vh; /* 基础行高单位 */
            gap: 1.5rem;
            padding: 8rem 2rem 4rem 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 响应式降级为2列 */
        @media (max-width: 1024px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            background: var(--accent-color);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .grid-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 不同比例的画框定义 */
        .item-normal { grid-row: span 4; } /* 4:5 左右的比例 */
        .item-featured { grid-column: span 2; grid-row: span 8; } /* 2x2 大图 */
        .item-tall { grid-row: span 8; } /* 1x2 竖长图 */

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保证画框不乱的核心 */
            transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            cursor: zoom-in;
        }

        .grid-item:hover img {
            transform: scale(1.05);
        }

        /* 灯箱预览 */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.98);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
        }

        .footer {
            padding: 4rem 2rem;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <!-- 加载层 -->
    <div id="loader">
        <div class="loader-num" id="loaderPercent">00</div>
    </div>

    <!-- 导航 -->
    <nav>
        <div class="logo">BUZZ</div>
        <div class="nav-links">
            <a href="#">Gallery</a>
            <a href="#">Studio</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- 主展示区 -->
    <main class="grid-container" id="mainGrid">
        <!-- JS 动态注入 -->
    </main>

    <footer class="footer">
        © BUZZ VISUAL. ALL RIGHTS RESERVED.
    </footer>

    <!-- 灯箱 -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" src="" alt="Full View">
    </div>

    <script>
        // 配置：图片序列 (IMAGE_ORDER)
        const IMAGE_ORDER = [
            "1 (1).jpg", "1 (2).jpg", "1 (3).jpg", "1 (4).jpg", "1 (5).jpg",
            "1 (6).jpg", "1 (7).jpg", "1 (8).jpg", "1 (9).jpg", "1 (10).jpg",
            "1 (11).jpg", "1 (12).jpg", "1 (13).jpg", "1 (14).jpg", "1 (15).jpg",
            "1 (16).jpg", "1 (17).jpg", "1 (18).jpg", "1 (19).jpg", "1 (20).jpg"
        ];

        // 模拟资源加载
        function initLoader() {
            let percent = 0;
            const loader = document.getElementById('loader');
            const num = document.getElementById('loaderPercent');
            
            const timer = setInterval(() => {
                percent += Math.floor(Math.random() * 5) + 1;
                if (percent >= 100) {
                    percent = 100;
                    clearInterval(timer);
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.display = 'none', 800);
                        revealGrid();
                    }, 500);
                }
                num.innerText = percent.toString().padStart(2, '0');
            }, 30);
        }

        // 生成 Grid 内容
        function generateGrid() {
            const container = document.getElementById('mainGrid');
            const version = new Date().getTime(); // 防止缓存

            IMAGE_ORDER.forEach((fileName, index) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                
                // 杂志感逻辑分配
                if (index === 0) {
                    item.classList.add('item-featured'); // 第一张 2x2
                } else if ((index + 1) % 6 === 0) {
                    item.classList.add('item-tall');     // 每6张一个竖长
                } else if (index > 0 && index % 15 === 0) {
                    item.classList.add('item-featured'); // 每15张一个大图
                } else {
                    item.classList.add('item-normal');   // 默认
                }

                // 处理带空格的文件名并生成图片路径
                const safeName = encodeURIComponent(fileName);
                const img = document.createElement('img');
                img.src = `https://images.unsplash.com/photo-${1500000000000 + index}?auto=format&fit=crop&w=1200&q=80&v=${version}`; 
                // 提示：此处 Unsplash 链接仅为演示占位，实际部署时请替换为你的相对路径如 `./images/${safeName}?v=${version}`
                
                img.alt = fileName;
                img.loading = "lazy";
                img.onclick = (e) => openLightbox(img.src);

                item.appendChild(img);
                container.appendChild(item);
            });
        }

        // 滚动揭示动画
        function revealGrid() {
            const items = document.querySelectorAll('.grid-item');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            items.forEach(item => observer.observe(item));
        }

        // 灯箱逻辑
        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            img.src = src;
            lb.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // ESC 键退出
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeLightbox();
        });

        // 初始化
        window.onload = () => {
            generateGrid();
            initLoader();
        };
    </script>
</body>
</html>
