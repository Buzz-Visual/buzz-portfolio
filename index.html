<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUZZVISUAL | Architectural Visualization</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Noto+Sans+SC:wght@200;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f2f2f2; 
            --text-main: #1a1a1a;
            --text-muted: #666;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            letter-spacing: 0.02em;
        }

        /* 瀑布流布局 */
        .masonry-grid {
            column-count: 1;
            column-gap: 2.5rem;
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 3; } }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 3rem;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            filter: grayscale(0.6);
            opacity: 0.85;
        }

        .masonry-item:hover {
            filter: grayscale(0);
            opacity: 1;
            transform: translateY(-10px);
        }

        /* 沉浸式灯箱样式 */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(242, 242, 242, 0.98); /* 匹配网页背景的超淡色遮罩 */
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #lightbox.active {
            display: flex;
            opacity: 1;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 85%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transform: scale(0.95);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #lightbox.active img {
            transform: scale(1);
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #d1d1d1; }

        /* 动画 */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .reveal { animation: reveal 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

        .micro-text {
            font-size: 9px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            font-weight: 300;
        }

        .brand-line {
            height: 1px;
            background: #000;
            width: 40px;
            transition: width 0.6s ease;
        }
        header:hover .brand-line {
            width: 80px;
        }
    </style>
</head>
<body class="px-6 py-10 md:px-16 md:py-20 lg:px-24">

    <!-- 灯箱容器 -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Zoomed View">
        <div class="absolute bottom-10 micro-text text-gray-400">Click anywhere to close</div>
    </div>

    <!-- 导航栏 -->
    <header class="mb-24 md:mb-40 flex flex-col md:flex-row justify-between items-start reveal">
        <div class="group cursor-default">
            <p class="micro-text text-gray-500 mb-3">BUZZVISUAL STUDIO</p>
            <h1 class="text-3xl md:text-4xl font-light tracking-tighter mb-4">BUZZVISUAL</h1>
            <div class="brand-line"></div>
        </div>
        <nav class="mt-12 md:mt-0 flex flex-wrap gap-x-12 gap-y-4 micro-text text-gray-500">
            <a href="#" class="hover:text-black transition-colors border-b border-transparent hover:border-black">Selected Works</a>
            <a href="#" class="hover:text-black transition-colors border-b border-transparent hover:border-black">Archive</a>
            <a href="#" class="hover:text-black transition-colors border-b border-transparent hover:border-black">About</a>
            <a href="mailto:office@buzzvisual.com" class="text-black font-normal">Contact</a>
        </nav>
    </header>

    <!-- 画廊 -->
    <main id="gallery" class="masonry-grid reveal" style="animation-delay: 0.3s;">
        <!-- JS 自动注入图片 -->
    </main>

    <!-- 页脚 -->
    <footer class="mt-40 mb-10 pt-12 border-t border-gray-200 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="micro-text text-gray-400">
            © 2024 BUZZVISUAL.COM — ALL RIGHTS RESERVED
        </div>
        <div class="flex gap-8 micro-text text-gray-400">
            <a href="#" class="hover:text-black transition-colors">Instagram</a>
            <a href="#" class="hover:text-black transition-colors">Behance</a>
        </div>
    </footer>

    <script>
        const IMAGE_COUNT = 20; 
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function initGallery() {
            for (let i = 1; i <= IMAGE_COUNT; i++) {
                const fileName = `1 (${i}).jpg`;
                
                const item = document.createElement('div');
                item.className = 'masonry-item group cursor-zoom-in';
                // 绑定点击事件，打开灯箱
                item.onclick = () => openLightbox(fileName);

                item.innerHTML = `
                    <div class="relative overflow-hidden bg-[#e8e8e8]">
                        <img 
                            src="${encodeURIComponent(fileName)}" 
                            alt="BuzzVisual Architectural Rendering ${i}"
                            class="w-full h-auto grayscale-[0.4] group-hover:grayscale-0 transition-all duration-1000 ease-in-out scale-100 group-hover:scale-[1.03]"
                            loading="lazy"
                            onerror="handleImageError(this, '${fileName}')"
                        >
                        <div class="absolute inset-0 flex items-end p-8 opacity-0 group-hover:opacity-100 transition-opacity duration-700 bg-gradient-to-t from-black/20 to-transparent">
                            <span class="micro-text text-white">Full Screen +</span>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-between items-baseline opacity-50 group-hover:opacity-100 transition-all duration-500">
                        <h3 class="micro-text text-gray-900 font-normal">BV-REF-${i.toString().padStart(3, '0')}</h3>
                        <span class="micro-text text-gray-400">PROJECT / 2024</span>
                    </div>
                `;

                gallery.appendChild(item);
            }
        }

        // 灯箱逻辑
        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // 禁止背景滚动
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto'; // 恢复滚动
        }

        function handleImageError(img, name) {
            img.parentElement.innerHTML = `
                <div class="py-32 flex items-center justify-center bg-[#e8e8e8] text-[9px] uppercase tracking-[0.3em] text-gray-400">
                    Image Syncing / ${name}
                </div>
            `;
        }

        window.addEventListener('load', initGallery);

        // ESC 键关闭灯箱
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
