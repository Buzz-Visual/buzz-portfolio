<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUZZ | Architectural Visualization</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500&family=Noto+Sans+SC:wght@100;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f9f9f9; 
            --text-main: #111111;
            --accent: #e5e5e5;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- 艺术化加载页 (Preloader) --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #111;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .loader-count {
            font-size: 12vw;
            font-weight: 100;
            line-height: 1;
            letter-spacing: -0.05em;
        }

        /* --- 初始全屏首屏 (Hero Section) --- */
        .hero {
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            clip-path: inset(0 0 0 0); /* 用于入场切片效果 */
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: artisticPan 30s infinite alternate ease-in-out;
            opacity: 0.8;
            filter: saturate(0.8) contrast(1.1);
        }

        @keyframes artisticPan {
            0% { transform: scale(1.1) translateX(-2%); }
            100% { transform: scale(1.2) translateX(2%); }
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            max-width: 80vw;
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 6.5rem);
            font-weight: 100;
            letter-spacing: -0.03em;
            line-height: 0.9;
            opacity: 0;
            transform: translateY(30px);
            animation: titleReveal 1.5s 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes titleReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 瀑布流画廊 --- */
        .masonry-grid {
            column-count: 1;
            column-gap: 4rem;
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 3; } }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 6rem;
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
            filter: grayscale(1);
            opacity: 0.7;
        }

        .masonry-item:hover {
            filter: grayscale(0);
            opacity: 1;
            transform: translateY(-15px);
        }

        .zoom-container {
            position: relative;
            overflow: hidden;
            background: var(--accent);
        }

        .zoom-container img {
            transition: transform 8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .masonry-item:hover .zoom-container img {
            transform: scale(1.12);
        }

        /* --- 灯箱 --- */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(249, 249, 249, 0.99);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #lightbox.active { display: flex; animation: fadeIn 0.5s forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #lightbox img {
            max-width: 85%;
            max-height: 80%;
            object-fit: contain;
        }

        .micro-text {
            font-size: 10px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-weight: 300;
        }

        .line-accent {
            height: 1px;
            background: currentColor;
            width: 0;
            transition: width 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .group:hover .line-accent { width: 100%; }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <!-- 加载动画 -->
    <div id="loader">
        <div class="loader-count" id="loader-percent">00</div>
        <div class="micro-text mt-4 opacity-40">Loading Archive</div>
    </div>

    <!-- 沉浸式灯箱 -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="">
        <div class="absolute top-12 right-12 micro-text cursor-pointer">Close ✕</div>
    </div>

    <!-- 首屏 Hero Section -->
    <section class="hero">
        <img src="1 (1).jpg" class="hero-bg" alt="Hero">
        <div class="hero-content">
            <p class="micro-text mb-8 opacity-40 tracking-[0.8em]">Atmosphere / Space / Light</p>
            <h2 class="hero-title">Beyond the<br><i class="font-serif italic opacity-80">Visible.</i></h2>
            <div class="mt-20">
                <button onclick="scrollToGallery()" class="group">
                    <p class="micro-text opacity-40 group-hover:opacity-100 transition-opacity">Explore Portfolio</p>
                    <div class="line-accent mt-2 mx-auto"></div>
                </button>
            </div>
        </div>
    </section>

    <!-- 网页主体容器 -->
    <div id="main-content" class="px-8 py-20 md:px-24 md:py-40 lg:px-40">
        
        <!-- 艺术化导航 -->
        <header class="mb-40 md:mb-64 flex flex-col md:flex-row justify-between items-start">
            <div class="group cursor-default">
                <h1 class="text-8xl md:text-[12rem] font-thin tracking-tighter leading-[0.8] mb-8 transition-all duration-700 group-hover:tracking-normal">BUZZ</h1>
                <p class="micro-text text-gray-400 ml-2">Digital Craftsmanship</p>
            </div>
            <nav class="mt-20 md:mt-4 flex flex-col gap-6 micro-text text-gray-400 text-right w-full md:w-auto">
                <a href="#" class="group">
                    <span class="hover:text-black transition-colors">Architecture</span>
                    <div class="line-accent bg-black"></div>
                </a>
                <a href="#" class="group">
                    <span class="hover:text-black transition-colors">Interior</span>
                    <div class="line-accent bg-black"></div>
                </a>
                <a href="mailto:office@buzzvisual.com" class="text-black font-medium mt-4">Connect —></a>
            </nav>
        </header>

        <!-- 画廊主体 -->
        <main id="gallery" class="masonry-grid">
            <!-- 由 JS 生成 -->
        </main>

        <!-- 页脚 -->
        <footer class="mt-64 mb-20 flex flex-col md:flex-row justify-between items-end gap-12">
            <div class="max-w-xl">
                <p class="text-3xl font-extralight leading-relaxed text-gray-400">
                    We translate unbuilt architecture into <span class="text-black">visual experiences</span> that evoke emotion and tell stories of space.
                </p>
            </div>
            <div class="flex flex-col items-end gap-4 micro-text text-gray-300">
                <span>London / Global</span>
                <span class="text-gray-900">© 2024 BUZZ STUDIO</span>
            </div>
        </footer>
    </div>

    <script>
        const IMAGE_COUNT = 20; 
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        // 加载动画逻辑
        function startLoader() {
            let count = 0;
            const counter = document.getElementById('loader-percent');
            const interval = setInterval(() => {
                count += Math.floor(Math.random() * 15) + 1;
                if (count >= 100) {
                    count = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loader').style.transform = 'translateY(-100%)';
                    }, 500);
                }
                counter.innerText = count.toString().padStart(2, '0');
            }, 80);
        }

        function initGallery() {
            for (let i = 1; i <= IMAGE_COUNT; i++) {
                const fileName = `1 (${i}).jpg`;
                const item = document.createElement('div');
                item.className = 'masonry-item group cursor-zoom-in';
                item.onclick = () => openLightbox(fileName);

                item.innerHTML = `
                    <div class="zoom-container">
                        <img 
                            src="${encodeURIComponent(fileName)}" 
                            alt="Visual ${i}"
                            class="w-full h-auto"
                            loading="lazy"
                            onerror="handleImageError(this, '${fileName}')"
                        >
                        <div class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>
                    </div>
                    <div class="mt-10 flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <h3 class="micro-text text-gray-900 font-medium">Ref. BV-0${i}</h3>
                            <div class="w-8 h-px bg-gray-200"></div>
                        </div>
                        <p class="text-[11px] text-gray-400 uppercase tracking-widest">Architectural Still</p>
                    </div>
                `;
                gallery.appendChild(item);
            }
        }

        function scrollToGallery() {
            document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' });
        }

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function handleImageError(img, name) {
            img.parentElement.innerHTML = `
                <div class="py-48 flex items-center justify-center bg-gray-100 micro-text text-gray-300">
                    Pending / ${name}
                </div>
            `;
        }

        window.addEventListener('load', () => {
            startLoader();
            initGallery();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
