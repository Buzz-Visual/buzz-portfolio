<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUZZ | Architectural Visualization</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500&family=Noto+Sans+SC:wght@100;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f9f9f9; 
            --text-main: #111111;
            --accent: #e5e5e5;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- 黑色幕布加载页 (Curtain Loader) --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #0d0d0d;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: transform 1.4s cubic-bezier(0.82, 0.01, 0.2, 1);
        }

        .loader-count {
            font-size: 14vw;
            font-weight: 100;
            line-height: 1;
            letter-spacing: -0.05em;
            font-variant-numeric: tabular-nums;
        }

        /* --- 主内容入场效果 --- */
        #main-wrapper {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1) 0.6s;
        }

        body.loaded #main-wrapper {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- 瀑布流画廊 (调整间隙) --- */
        .masonry-grid {
            column-count: 1;
            column-gap: 2rem; /* 左右空隙减小一半 */
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 3; } }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 3rem; /* 上下空隙减小一半 */
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
            opacity: 1;
        }

        .masonry-item:hover {
            opacity: 0.8;
            transform: translateY(-10px);
        }

        .zoom-container {
            position: relative;
            overflow: hidden;
            background: var(--accent);
        }

        .zoom-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            transition: transform 8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .masonry-item:hover .zoom-container img {
            transform: scale(1.08);
        }

        /* --- 横线动效 --- */
        .nav-link {
            position: relative;
            padding-bottom: 4px;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background-color: #111;
            transition: width 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .nav-link:hover::after {
            width: 100%;
        }

        /* --- 灯箱优化 --- */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(249, 249, 249, 0.98);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #lightbox.active { 
            display: flex; 
            opacity: 1;
        }

        #lightbox img {
            max-width: 85%;
            max-height: 80%;
            object-fit: contain;
            transform: scale(0.95);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #lightbox.active img {
            transform: scale(1);
        }

        .micro-text {
            font-size: 10px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="bg-[#f9f9f9]">

    <!-- 加载幕布 -->
    <div id="loader">
        <div class="loader-count" id="loader-percent">00</div>
        <div class="micro-text mt-6 opacity-30 tracking-[1em]">Preparing Gallery</div>
    </div>

    <!-- 沉浸式灯箱 -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="">
        <div class="absolute top-12 right-12 micro-text cursor-pointer">Close ✕</div>
    </div>

    <!-- 主页面容器 -->
    <div id="main-wrapper" class="px-8 py-20 md:px-24 md:py-40 lg:px-40">
        
        <!-- 品牌头部 -->
        <header class="mb-32 md:mb-52 flex flex-col md:flex-row justify-between items-start">
            <div class="group cursor-default">
                <h1 class="text-7xl md:text-9xl font-thin tracking-tighter leading-none mb-6 transition-all duration-1000 group-hover:tracking-normal">BUZZ</h1>
                <p class="micro-text text-gray-400 ml-1">Digital Visualization Studio</p>
            </div>
            <nav class="mt-20 md:mt-4 flex flex-col gap-6 micro-text text-gray-400 text-right w-full md:w-auto">
                <a href="#" class="nav-link text-gray-400 hover:text-black transition-colors inline-block ml-auto">Archive</a>
                <a href="#" class="nav-link text-gray-400 hover:text-black transition-colors inline-block ml-auto">Information</a>
                <a href="mailto:office@buzzvisual.com" class="text-black font-medium mt-4">Contact —></a>
            </nav>
        </header>

        <!-- 画廊主体 -->
        <main id="gallery" class="masonry-grid">
            <!-- 图片由 JS 生成 -->
        </main>

        <!-- 页脚 -->
        <footer class="mt-64 mb-20 flex flex-col md:flex-row justify-between items-end gap-12">
            <div class="max-w-xl">
                <p class="text-3xl font-extralight leading-tight text-gray-300">
                    Capturing the <span class="text-black italic">essence</span> of space through light and matter.
                </p>
            </div>
            <div class="flex flex-col items-end gap-4 micro-text text-gray-300">
                <span>London / Global</span>
                <span class="text-gray-900 font-normal">© 2024 BUZZVISUAL</span>
            </div>
        </footer>
    </div>

    <script>
        const IMAGE_COUNT = 20; 
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function startLoader() {
            let count = 0;
            const counter = document.getElementById('loader-percent');
            
            const interval = setInterval(() => {
                count += Math.floor(Math.random() * 12) + 1;
                
                if (count >= 100) {
                    count = 100;
                    clearInterval(interval);
                    
                    setTimeout(() => {
                        document.getElementById('loader').style.transform = 'translateY(-100%)';
                        document.body.classList.add('loaded');
                    }, 600);
                }
                counter.innerText = count.toString().padStart(2, '0');
            }, 60);
        }

        function initGallery() {
            for (let i = 1; i <= IMAGE_COUNT; i++) {
                const fileName = `1 (${i}).jpg`;
                const item = document.createElement('div');
                item.className = 'masonry-item group cursor-zoom-in';
                item.onclick = () => openLightbox(fileName);

                item.innerHTML = `
                    <div class="zoom-container">
                        <img 
                            src="${encodeURIComponent(fileName)}" 
                            alt="BV Ref ${i}"
                            loading="lazy"
                            onerror="handleImageError(this, '${fileName}')"
                        >
                    </div>
                    <div class="mt-5 flex items-center gap-4"> <!-- 间距减小 -->
                        <span class="micro-text text-gray-900 font-medium">Ref. 0${i}</span>
                        <div class="flex-grow h-[1px] bg-gray-100"></div>
                        <span class="micro-text text-gray-300">Project</span>
                    </div>
                `;
                gallery.appendChild(item);
            }
        }

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
            void lightbox.offsetWidth;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            setTimeout(() => {
                if (!lightbox.classList.contains('active')) {
                    lightbox.style.display = 'none';
                }
            }, 500);
            document.body.style.overflow = 'auto';
        }

        function handleImageError(img, name) {
            const container = img.parentElement;
            container.classList.add('aspect-[4/5]', 'flex', 'flex-col', 'items-center', 'justify-center', 'bg-[#f2f2f2]', 'text-gray-300');
            container.innerHTML = `
                <span class="micro-text mb-2">Syncing</span>
                <span class="text-[8px] opacity-40">${name}</span>
            `;
        }

        window.addEventListener('load', () => {
            startLoader();
            initGallery();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
